services:
  sumo-service:
    volumes:
      - ./sumo_service/app:/app/app
      - ./sumo_service/sumo_configs:/app/sumo_configs
    environment:
      - WATCHFILES_FORCE_POLLING=true
    command:
      [
        "uv", "run", "uvicorn", "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8080",
        "--reload"
      ]
